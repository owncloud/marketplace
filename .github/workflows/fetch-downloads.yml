name: Fetch downloads
# Fetches the latest releases of Infinite Scale, the desktop client and mobile
# apps from GitHub, plus the classic ownCloud Server 10.x (its version from the
# owncloud/core git tags and archives from download.owncloud.com), and commits
# data/downloads.json, which the deploy build normalizes into
# api/v1/downloads.json. Runs on the protected branch — on a daily schedule or
# maintainer-triggered — never on PRs (fork PRs cannot be granted write access).
on:
  workflow_dispatch: {}
  schedule:
    # Daily at 06:17 UTC; offset from the hour to avoid the cron rush.
    - cron: "17 6 * * *"

permissions:
  contents: write

concurrency:
  group: fetch-downloads
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Install tools deps
        working-directory: tools
        run: npm ci
      - name: Fetch release data
        working-directory: tools
        # GITHUB_TOKEN lifts the anonymous rate limit on the GitHub API.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsx src/cli/fetch-downloads.ts --out ../data/downloads.json
      - name: Commit downloads data
        run: |
          git config user.name "owncloud-bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/downloads.json)" ]; then
            git add data/downloads.json
            git commit -m "chore: refresh downloads data"
            git push origin main
          else
            echo "Downloads data unchanged."
          fi
