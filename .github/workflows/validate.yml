name: Validate submissions
on:
  pull_request:
    paths: ["apps/**", "extensions/**"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
      - name: Install tools deps
        working-directory: tools
        run: npm ci
      - name: Enforce immutability/collision over changed paths
        working-directory: tools
        run: |
          # Fetch full base history (not --depth=1): check-changeset and
          # validate-screenshots diff with origin/<base>...HEAD, which needs a
          # merge base. A shallow base tip has no ancestors, so once main moves
          # past a PR's branch point the three-dot diff fails with "no merge
          # base". checkout already used fetch-depth: 0, so this stays unshallow.
          git fetch origin "${{ github.base_ref }}"
          npx tsx src/cli/check-changeset.ts "origin/${{ github.base_ref }}"
      - name: Validate all releases
        working-directory: tools
        run: npx tsx src/cli/validate.ts ../apps ../extensions
      - name: Validate screenshots on new releases
        working-directory: tools
        run: npx tsx src/cli/validate-screenshots.ts "origin/${{ github.base_ref }}"
